services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shelf
      POSTGRES_PASSWORD: shelf
      POSTGRES_DB: bookshelf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    # healthcheck tells other containers when Postgres is actually ready
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shelf -d bookshelf"]
      interval: 2s
      timeout: 5s
      retries: 10

  go-bookshelf:
    build: ./go-bookshelf
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://shelf:shelf@db:5432/bookshelf?sslmode=disable
    # depends_on with condition: wait until Postgres healthcheck passes
    depends_on:
      db:
        condition: service_healthy

  ts-bookshelf:
    build: ./ts-bookshelf
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://shelf:shelf@db:5432/bookshelf?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
volumes:
  pgdata:
